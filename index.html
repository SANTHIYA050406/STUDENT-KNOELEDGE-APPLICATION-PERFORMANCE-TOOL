<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Performance App - Login</title>
  <style>
    :root {
      --bg1: #eef3ff;
      --bg2: #fff7ea;
      --panel: #ffffff;
      --stroke: #d7e1f0;
      --text: #1e2a3a;
      --muted: #5f6c80;
      --brand: #0f766e;
      --brand-2: #115e59;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 18%, #ffeec9 0, #ffeec9 14%, transparent 16%),
        radial-gradient(circle at 86% 8%, #d6f7ef 0, #d6f7ef 14%, transparent 16%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      width: min(430px, 100%);
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(16, 30, 55, 0.12);
      padding: 22px;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 30px;
      letter-spacing: 0.3px;
    }

    h3 {
      margin: 0 0 8px;
      color: #1b344d;
    }

    p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 9px;
      border: 1px solid #cad6e6;
      padding: 10px 11px;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2f63b4;
      box-shadow: 0 0 0 3px #dbe7ff;
    }

    button {
      border: none;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .hint {
      margin: -6px 0 10px;
      font-size: 12px;
      color: #b42318;
    }

    .pw-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .pw-wrap input {
      margin-bottom: 0;
      padding-right: 44px;
    }

    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #cad6e6;
      background: #ffffff;
      color: #1e2a3a;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    .pw-toggle:focus {
      outline: none;
      box-shadow: 0 0 0 3px #dbe7ff;
      border-color: #2f63b4;
    }

    .pw-toggle svg { width: 18px; height: 18px; }

    .hidden { display: none; }

    .setup-box {
      margin-top: 10px;
      border-top: 1px dashed #d4deec;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username" />
    <p class="hint">Username must be at least 3 characters.</p>

    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Password" />
      <button type="button" class="pw-toggle" id="togglePassword" aria-label="Show password">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>
    <p class="hint">Password must be at least 6 characters.</p>
    <select id="role">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>
    <button id="loginBtn">Continue</button>

    <div id="studentSetup" class="setup-box hidden">
      <h3>Student First-Time Setup</h3>
      <p>Fill basic details to continue.</p>
      <input type="text" id="studentName" placeholder="Name" />
      <input type="text" id="studentRollNo" placeholder="Roll No" />
      <input type="text" id="studentDepartment" placeholder="Department" />
      <input type="number" id="studentCgpa" placeholder="Academics CGPA (0-10)" min="0" max="10" step="0.01" />
      <button id="saveStudentBtn">Save Student Details</button>
    </div>

    <div id="teacherSetup" class="setup-box hidden">
      <h3>Teacher First-Time Setup</h3>
      <p>Fill basic details to continue.</p>
      <input type="text" id="teacherName" placeholder="Name" />
      <input type="text" id="facultyId" placeholder="Faculty ID" />
      <input type="text" id="teacherDepartment" placeholder="Department" />
      <button id="saveTeacherBtn">Save Teacher Details</button>
    </div>
  </div>

  <script src="js/store.js"></script>
<script src="js/api.js"></script>
<script>
  const loginBtn = document.getElementById("loginBtn");
  const saveStudentBtn = document.getElementById("saveStudentBtn");
  const saveTeacherBtn = document.getElementById("saveTeacherBtn");

  const studentSetup = document.getElementById("studentSetup");
  const teacherSetup = document.getElementById("teacherSetup");
  const togglePassword = document.getElementById("togglePassword");

  let pendingUser = null;
  let pendingRole = null;

  togglePassword.addEventListener("click", () => {
    const input = document.getElementById("password");
    const showing = input.type === "text";
    input.type = showing ? "password" : "text";
    togglePassword.setAttribute("aria-label", showing ? "Show password" : "Hide password");
  });

  function showStudentSetup(user) {
    teacherSetup.classList.add("hidden");
    studentSetup.classList.remove("hidden");
    document.getElementById("studentName").value = user?.studentProfile?.name || user?.username || "";
    document.getElementById("studentRollNo").value = user?.studentProfile?.rollNo || "";
    document.getElementById("studentDepartment").value = user?.studentProfile?.department || "";
    document.getElementById("studentCgpa").value = user?.studentProfile?.cgpa ?? "";
  }

  function showTeacherSetup(user) {
    studentSetup.classList.add("hidden");
    teacherSetup.classList.remove("hidden");
    document.getElementById("teacherName").value = user?.teacherProfile?.name || user?.username || "";
    document.getElementById("facultyId").value = user?.teacherProfile?.facultyId || "";
    document.getElementById("teacherDepartment").value = user?.teacherProfile?.department || "";
  }

  async function loginExisting(username, password, expectedRole) {
    const { token, user } = await Api.login({ username, password });

    if (expectedRole === "student" && user.role !== "student") {
      throw new Error("This account is not a student account.");
    }
    if (expectedRole === "teacher" && !(user.role === "teacher" || user.role === "admin")) {
      throw new Error("This account is not a teacher account.");
    }

    AppStore.setAuth(user, token);
    window.location.href = expectedRole === "teacher" ? "admin_dashboard.html" : "dashboard.html";
  }

  loginBtn.addEventListener("click", async () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;

    if (!username || !password) {
      alert("Enter username and password.");
      return;
    }
    if (username.length < 3) {
      alert("Username must be at least 3 characters.");
      return;
    }
    if (password.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    try {
      await loginExisting(username, password, role);
      return;
    } catch (err) {
      const msg = String(err.message || "");
      if (!msg.toLowerCase().includes("invalid credentials")) {
        alert(msg);
        return;
      }
    }

    pendingUser = { username, password };
    pendingRole = role;
    if (role === "student") showStudentSetup({ username });
    else showTeacherSetup({ username });
  });

  saveStudentBtn.addEventListener("click", async () => {
    if (!pendingUser || pendingRole !== "student") return;

    const studentProfile = {
      name: document.getElementById("studentName").value.trim(),
      rollNo: document.getElementById("studentRollNo").value.trim(),
      department: document.getElementById("studentDepartment").value.trim(),
      cgpa: Number(document.getElementById("studentCgpa").value)
    };

    if (!studentProfile.name || !studentProfile.rollNo || !studentProfile.department || Number.isNaN(studentProfile.cgpa) || studentProfile.cgpa < 0 || studentProfile.cgpa > 10) {
      alert("Enter valid student details and CGPA 0-10.");
      return;
    }

    try {
      const { token, user } = await Api.register({
        username: pendingUser.username,
        password: pendingUser.password,
        role: "student",
        studentProfile
      });
      AppStore.setAuth(user, token);
      window.location.href = "dashboard.html";
    } catch (err) {
      alert(err.message || "Failed to register student.");
    }
  });

  saveTeacherBtn.addEventListener("click", async () => {
    if (!pendingUser || pendingRole !== "teacher") return;

    const teacherProfile = {
      name: document.getElementById("teacherName").value.trim(),
      facultyId: document.getElementById("facultyId").value.trim(),
      department: document.getElementById("teacherDepartment").value.trim()
    };

    if (!teacherProfile.name || !teacherProfile.facultyId || !teacherProfile.department) {
      alert("Enter teacher name, faculty ID, and department.");
      return;
    }

    try {
      const { token, user } = await Api.register({
        username: pendingUser.username,
        password: pendingUser.password,
        role: "teacher",
        teacherProfile
      });
      AppStore.setAuth(user, token);
      window.location.href = "admin_dashboard.html";
    } catch (err) {
      alert(err.message || "Failed to register teacher.");
    }
  });
</script>
</body>
</html>
