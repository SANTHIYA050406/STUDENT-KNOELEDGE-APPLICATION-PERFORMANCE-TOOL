<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Take Test</title>
    <link rel="stylesheet" href="css/hcare.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">H</div>
        <div>
          <strong>SKAPT</strong>
          <small>Test Hall</small>
        </div>
      </div>
      <nav>
        <button class="nav-link" onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button class="nav-link" onclick="window.location.href='create_test.html'">Create Test</button>
        <button class="nav-link active" onclick="window.location.href='take_test.html'">Take Test</button>
        <button class="nav-link" onclick="window.location.href='students_progress.html'">Progress</button>
        <button class="nav-link" onclick="window.location.href='student_detail.html'">Student Detail</button>
      </nav>
      <div class="sidebar-cta">
        <strong>Stay focused</strong>
        <p>Attempt the questions, then submit to record your score.</p>
        <a href="mailto:support@studenttool.com">Need proctor help?</a>
      </div>
    </aside>

    <div class="content">
      <header class="top-bar">
        <div class="title-block">
          <p class="eyebrow">Test session</p>
          <h2 id="testTitle">Take Test</h2>
        </div>
        <div class="search-box">
          <span>🔍</span>
          <input type="search" placeholder="Search questions or filter by topic" />
        </div>
        <div class="actions">
          <button type="button" class="pill" onclick="backToDashboard()">Back</button>
        </div>
      </header>

      <div class="container">
        <div id="testContainer" class="card"></div>
        <div class="card">
          <button class="pill" onclick="submitTest()">Submit Test</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
<script>
let currentTest = null;

async function loadTest() {
    const user = AppStore.getState().user;
    if (!user) { window.location.href = "index.html"; return; }

    const selectedTestId = localStorage.getItem("selectedTestId");
    if (!selectedTestId) {
        document.getElementById("testContainer").innerHTML = "<p>No test selected.</p>";
        return;
    }

    try {
        const { test } = await Api.getTest(selectedTestId);
        currentTest = test;
        document.getElementById("testTitle").textContent = test.title;

        document.getElementById("testContainer").innerHTML = test.questions.map((q, i) => `
            <div class="card">
                <p><strong>Q${i + 1}.</strong> ${q.text}</p>
                ${q.options.map((opt, idx) => {
                    const value = String.fromCharCode(65 + idx);
                    return `<label><input type="radio" name="q${i}" value="${value}"> ${opt}</label><br>`;
                }).join("")}
            </div>
        `).join("");
    } catch (err) {
        alert(err.message);
    }
}

async function submitTest() {
    if (!currentTest) return;

    const answers = currentTest.questions.map((_, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        return selected ? selected.value : "";
    });

    try {
        await Api.submitResult({ testId: currentTest.id, answers });
        window.location.href = "dashboard.html";
    } catch (err) {
        alert(err.message);
    }
}

function backToDashboard() {
    window.location.href = "dashboard.html";
}

loadTest();
</script>
</body>
</html>
