<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create / Manage Tests</title>
<style>
    body { font-family: Arial, sans-serif; background:#f3f7ff; margin:0; }
    .header { background:#0f766e; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; }
    .container { max-width:1000px; margin:16px auto; padding:0 12px; }
    .card { background:#fff; border:1px solid #d6e1f2; border-radius:10px; padding:14px; margin-bottom:12px; }
    input, button { padding:8px; margin:6px 0; }
    #questionsContainer > div { border:1px solid #ddd; border-radius:8px; padding:8px; margin-bottom:8px; }
    table { width:100%; border-collapse:collapse; }
    th, td { border-bottom:1px solid #e5ebf7; padding:8px; text-align:left; }
</style>
</head>
<body>
<div class="header">
    <h2>Create / Manage Tests</h2>
    <div>
        <a href="admin_dashboard.html" style="color:#fff;">Dashboard</a>
        <a href="#" onclick="logout()" style="color:#fff; margin-left:10px;">Logout</a>
    </div>
</div>
<div class="container">
    <div class="card">
        <input type="hidden" id="editingTestId">
        <input type="text" id="subject" placeholder="Subject">
        <input type="text" id="title" placeholder="Test Title">
        <input type="number" id="duration" placeholder="Duration (minutes)" min="5" value="30">
        <input type="number" id="numQuestions" placeholder="Number of Questions" min="1">
        <div id="questionsContainer"></div>
        <button onclick="saveTest()">Save Test</button>
        <button onclick="resetForm()">Reset</button>
    </div>

    <div class="card">
        <h3>My Tests</h3>
        <table>
            <thead><tr><th>Title</th><th>Subject</th><th>Questions</th><th>Actions</th></tr></thead>
            <tbody id="testsBody"></tbody>
        </table>
    </div>
</div>

<script src="js/store.js"></script>
<script src="js/api.js"></script>
<script>
const numQuestionsInput = document.getElementById("numQuestions");
const questionsContainer = document.getElementById("questionsContainer");

numQuestionsInput.addEventListener("change", () => buildQuestionInputs(Number(numQuestionsInput.value)));

function buildQuestionInputs(count, existing = []) {
    questionsContainer.innerHTML = "";
    for (let i = 0; i < count; i++) {
        const q = existing[i] || { text: "", options: ["", "", "", ""], answer: "A" };
        const div = document.createElement("div");
        div.innerHTML = `
            <h4>Question ${i + 1}</h4>
            <input type="text" class="qText" placeholder="Question" value="${q.text}"><br>
            <input type="text" class="optA" placeholder="Option A" value="${q.options[0] || ""}"><br>
            <input type="text" class="optB" placeholder="Option B" value="${q.options[1] || ""}"><br>
            <input type="text" class="optC" placeholder="Option C" value="${q.options[2] || ""}"><br>
            <input type="text" class="optD" placeholder="Option D" value="${q.options[3] || ""}"><br>
            <input type="text" class="correctAns" placeholder="Correct (A/B/C/D)" value="${q.answer}">
        `;
        questionsContainer.appendChild(div);
    }
}

function collectQuestions() {
    return [...document.querySelectorAll("#questionsContainer > div")].map(div => ({
        text: div.querySelector(".qText").value.trim(),
        options: [
            div.querySelector(".optA").value.trim(),
            div.querySelector(".optB").value.trim(),
            div.querySelector(".optC").value.trim(),
            div.querySelector(".optD").value.trim()
        ],
        answer: div.querySelector(".correctAns").value.trim().toUpperCase()
    }));
}

async function saveTest() {
    try {
        const payload = {
            subject: document.getElementById("subject").value.trim(),
            title: document.getElementById("title").value.trim(),
            duration: Number(document.getElementById("duration").value || 30),
            questions: collectQuestions()
        };

        if (!payload.subject || !payload.title || !payload.questions.length) {
            alert("Subject, title and questions are required.");
            return;
        }

        const editingId = document.getElementById("editingTestId").value;
        if (editingId) {
            await Api.updateTest(editingId, payload);
        } else {
            await Api.createTest(payload);
        }

        resetForm();
        await loadTests();
    } catch (err) {
        alert(err.message);
    }
}

function editTest(id) {
    const { tests } = AppStore.getState();
    const t = tests.find(x => x.id === id);
    if (!t) return;

    document.getElementById("editingTestId").value = t.id;
    document.getElementById("subject").value = t.subject;
    document.getElementById("title").value = t.title;
    document.getElementById("duration").value = t.duration;
    document.getElementById("numQuestions").value = t.questions.length;
    buildQuestionInputs(t.questions.length, t.questions);
}

async function deleteTest(id) {
    if (!confirm("Delete this test?")) return;
    try {
        await Api.deleteTest(id);
        await loadTests();
    } catch (err) {
        alert(err.message);
    }
}

function resetForm() {
    document.getElementById("editingTestId").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("title").value = "";
    document.getElementById("duration").value = 30;
    document.getElementById("numQuestions").value = "";
    questionsContainer.innerHTML = "";
}

async function loadTests() {
    const user = AppStore.getState().user;
    if (!user || user.role === "student") {
        window.location.href = "index.html";
        return;
    }

    const { tests } = await Api.getTests();
    const mine = tests.filter(t => t.createdBy === user.id || user.role === "admin");
    AppStore.setTests(mine);

    document.getElementById("testsBody").innerHTML = mine.length
        ? mine.map(t => `<tr><td>${t.title}</td><td>${t.subject}</td><td>${t.questions.length}</td><td><button onclick="editTest(${t.id})">Edit</button> <button onclick="deleteTest(${t.id})">Delete</button></td></tr>`).join("")
        : '<tr><td colspan="4">No tests found.</td></tr>';
}

function logout() {
    AppStore.clearAuth();
    window.location.href = "index.html";
}

loadTests();
</script>
</body>
</html>
