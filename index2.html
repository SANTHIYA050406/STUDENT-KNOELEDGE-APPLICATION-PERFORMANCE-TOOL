<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hint {
            display: block;
            color: #dc2626;
            font-size: 12px;
            margin: -6px 0 12px;
        }

        .pw-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .pw-wrap input {
            margin-bottom: 0;
            padding-right: 44px;
        }

        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            padding: 0;
        }

        .pw-toggle svg { width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Online Test System</h2><br>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <small class="hint">Username must be at least 3 characters.</small>

        <div class="pw-wrap">
            <input type="password" id="password" placeholder="Password" required>
            <button type="button" class="pw-toggle" id="togglePassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
        <small class="hint">Password must be at least 6 characters.</small>
        <select id="role">
            <option value="student">Student</option>
            <option value="admin">Faculty</option>
        </select>
        <button type="submit">Login</button>
    </form>
</div>

<script src="js/store.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    (function () {
        const toggle = document.getElementById("togglePassword");
        if (!toggle) return;

        toggle.addEventListener("click", () => {
            const input = document.getElementById("password");
            const showing = input.type === "text";
            input.type = showing ? "password" : "text";
            toggle.setAttribute("aria-label", showing ? "Show password" : "Hide password");
        });
    })();
</script>
</body>
</html>
